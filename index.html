<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>HAG Spell Search</title>
    <meta name="description" content="Build BookStack search URLs for the Hiraeth spell compendium.">
    <link rel="stylesheet" href="./styles.css?v=20260628f">
    <script>
      (() => {
        const theme = new URLSearchParams(window.location.search).get("theme");
        if (theme === "light" || theme === "dark") document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <main class="shell">
      <form id="spell-search-form" action="https://www.hiraeth.wiki/search" method="get" target="_top">
        <input id="bookstack-term" type="hidden" name="term" value="{type:page}">

        <section class="query-panel" aria-labelledby="query-heading">
          <div class="query-copy">
            <h2 id="query-heading">Search Builder</h2>
            <label class="text-field" for="free-text">
              <span>Words in spell name or text</span>
              <input id="free-text" type="search" autocomplete="off" placeholder="fire shield, teleport, familiar">
            </label>
          </div>

          <div class="query-actions">
            <button class="primary-button" type="submit">Search spells</button>
            <button class="ghost-button" type="button" data-clear>Clear</button>
          </div>
        </section>

        <section class="quick-panel" aria-labelledby="quick-heading">
          <div class="section-heading">
            <h2 id="quick-heading">Quick Starts</h2>
            <span id="result-count" class="count-badge" aria-live="polite">0 filters</span>
          </div>
          <div id="quick-presets" class="quick-grid"></div>
        </section>

        <section class="filters" aria-labelledby="filters-heading">
          <div class="section-heading">
            <h2 id="filters-heading">Filters</h2>
            <button class="ghost-button small" type="button" data-expand-toggle aria-controls="filter-groups" aria-expanded="false">Expand all</button>
          </div>
          <div id="filter-groups" class="filter-grid"></div>
        </section>
      </form>

      <noscript>
        <p class="noscript">JavaScript is required for the builder. You can still use <a href="https://www.hiraeth.wiki/search?term=%7Btype%3Apage%7D" target="_top" rel="noreferrer">BookStack spell search</a>.</p>
      </noscript>
    </main>

    <script src="./app.js?v=20260628d" defer></script>
  </body>
</html>
